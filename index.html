<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practometry Dash - VERSION ONE</title>
    <style>
        :root {
            --c1: #00ffcc; 
            --c2: #ff0055; 
        }

        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        #ui-panel { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: rgba(17, 21, 34, 0.8); backdrop-filter: blur(10px);
            padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; 
            border-bottom: 3px solid var(--c1); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); z-index: 100; box-sizing: border-box;
        }
        
        select, label, button { background: #050508; color: var(--c1); border: 1px solid var(--c1); padding: 6px 12px; font-size: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.2s; }
        button:hover { background: var(--c1); color: #050508; box-shadow: 0 0 15px var(--c1); }
        
        /* Fullscreen Canvas */
        #game-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        canvas { background: linear-gradient(to bottom, #0a0e17, #131b2f); display: block; touch-action: none; width: 100%; height: 100%; }
        
        /* Version Watermark */
        #version-label { position: fixed; bottom: 15px; left: 15px; color: rgba(255, 255, 255, 0.3); font-family: monospace; font-size: 16px; font-weight: bold; z-index: 100; pointer-events: none; letter-spacing: 2px; }

        /* Modals */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 8, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .modal h1 { color: var(--c2); font-size: 60px; margin: 0 0 20px 0; letter-spacing: 4px; text-shadow: 0 0 20px var(--c2); }
        .action-btn { background: var(--c1); color: #050508; border: 2px solid var(--c1); padding: 15px 50px; font-size: 28px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: transform 0.1s; pointer-events: auto; box-shadow: 0 0 20px var(--c1); margin-top: 20px;}
        .action-btn:active { transform: scale(0.95); }
        
        /* Stats & Customization UI */
        .window-container { width: 95%; max-width: 900px; height: 85%; display: flex; flex-direction: column; background: rgba(17, 21, 34, 0.9); border: 2px solid var(--c1); border-radius: 10px; padding: 20px; box-sizing: border-box; margin-bottom: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center;}
        
        #global-stats { text-align: center; border-bottom: 1px solid var(--c1); padding-bottom: 10px; margin-bottom: 15px; font-size: 20px; color: #c5c6c7; flex-shrink: 0; width: 100%;}
        #global-stats span { color: var(--c1); font-weight: bold; font-size: 26px; text-shadow: 0 0 10px var(--c1); }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; justify-content: center; flex-shrink: 0; }
        .tab-btn { background: #050508; border: 1px solid var(--c1); color: #c5c6c7; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab-btn.active { background: var(--c1); color: #050508; }
        
        .sub-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; justify-content: center; flex-shrink: 0; }
        .sub-tab-btn { background: #050508; border: 1px solid var(--c2); color: #c5c6c7; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .sub-tab-btn.active { background: var(--c2); color: #fff; }

        .speed-tab-btn { background: #050508; border: 1px solid #fca311; color: #c5c6c7; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .speed-tab-btn.active { background: #fca311; color: #050508; }
        
        #tab-contents-container { width: 100%; flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        
        .stats-row { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        .stat-box { background: #050508; border: 1px solid var(--c1); padding: 20px; border-radius: 8px; flex: 1; min-width: 250px; max-width: 350px; text-align: center; }
        .stat-box h3 { margin: 0 0 15px 0; color: var(--c1); text-transform: uppercase; font-size: 22px;}
        .stat-box.dual-box h3 { color: var(--c2); }
        .stat-box.dual-box { border-color: var(--c2); }
        .stat-box p { margin: 8px 0; color: #c5c6c7; font-size: 16px; }
        .stat-box span { color: #fff; font-weight: bold; font-size: 24px; }
        
        .score-board { margin-left: 20px; font-size: 20px; font-weight: bold; line-height: 1.2; text-align: right; letter-spacing: 1px;}
        .score-board span { color: var(--c1); font-size: 24px; text-shadow: 0 0 15px var(--c1); }

        .cust-controls { display: flex; gap: 20px; margin-top: 20px; align-items: center; }
        .cust-controls select { font-size: 18px; padding: 10px; }
        #previewCanvas { background: #050508; border: 2px solid var(--c2); border-radius: 10px; box-shadow: 0 0 20px rgba(255,0,85,0.3); margin-top: 20px;}
    </style>
</head>
<body>

    <div id="version-label">VERSION ONE</div>

    <div id="ui-panel">
        <select id="modeSelect" onchange="window.handleSettingsChange()">
            <option value="cube">Cube</option>
            <option value="ship">Ship</option>
            <option value="wave">Wave</option>
            <option value="ufo">UFO</option>
            <option value="robot">Robot</option>
            <option value="spider">Spider</option>
            <option value="ball">Ball</option>
            <option value="swing">Swing</option>
        </select>
        <select id="diffSelect" onchange="window.handleSettingsChange()">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option selected value="normal">Normal</option>
            <option value="hard">Hard</option>
            <option value="extreme">Extreme</option>
        </select>
        <select id="speedSelect" onchange="window.handleSettingsChange()">
            <option value="5">Slow</option>
            <option selected value="8">Normal Spd</option>
            <option value="11">Fast</option>
            <option value="14">2x Speed</option>
        </select>
        <label><input type="checkbox" id="dualCheck" onchange="window.handleSettingsChange()"> Dual</label>
        <label><input type="checkbox" id="musicCheck" checked onchange="window.toggleMusic()"> Music</label>
        
        <button id="btn-open-stats" onclick="window.openStats()">STATS</button>
        <button id="btn-open-cust" onclick="window.openCust()" style="border-color: var(--c2); color: var(--c2);">CUSTOMIZE</button>
        
        <div class="score-board">
            SCORE: <span id="score">0</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay" class="modal" style="display: flex;">
            <h1 id="crash-text" style="display: none;">CRASHED!</h1>
            <button id="start-btn" class="action-btn" onclick="window.forceStartGame()">START GAME</button>
        </div>

        <div id="stats-overlay" class="modal">
            <div class="window-container">
                <div id="global-stats">
                    Global High Score: <span id="glob-high">0</span> | Total Attempts: <span id="glob-att">0</span> | Time: <span id="glob-time">0s</span>
                </div>
                <div class="tabs" id="mode-tabs"></div>
                <div class="sub-tabs" id="diff-tabs"></div>
                <div class="sub-tabs" id="speed-tabs"></div>
                <div id="tab-contents-container"></div>
            </div>
            <button id="btn-close-stats" class="action-btn" onclick="window.closeStats()" style="background: var(--c2); color: white; border-color: var(--c2); box-shadow: 0 0 20px var(--c2);">CLOSE STATS</button>
        </div>

        <div id="cust-overlay" class="modal">
            <div class="window-container" style="justify-content: center;">
                <h2 style="color: var(--c1); font-size: 36px; margin: 0;">ICON FORGE</h2>
                <canvas id="previewCanvas" width="200" height="200"></canvas>
                
                <div class="cust-controls">
                    <select id="custModeSelect" onchange="window.updateCustMode()">
                        <option value="cube">Cube</option>
                        <option value="ship">Ship</option>
                        <option value="wave">Wave</option>
                        <option value="ufo">UFO</option>
                        <option value="robot">Robot</option>
                        <option value="spider">Spider</option>
                        <option value="ball">Ball</option>
                        <option value="swing">Swing</option>
                    </select>
                    <select id="custStyleSelect" onchange="window.updateCustStyle()">
                        <option value="1">1. Classic</option>
                        <option value="2">2. Inverted Core</option>
                        <option value="3">3. Hollow Frame</option>
                        <option value="4">4. Cyclops Eye</option>
                        <option value="5">5. Crosshair</option>
                        <option value="6">6. Target X</option>
                        <option value="7">7. Diamond Core</option>
                        <option value="8">8. Dual Dots</option>
                        <option value="9">9. Split Horizon</option>
                        <option value="10">10. Dashed Ghost</option>
                    </select>
                </div>
            </div>
            <button id="btn-close-cust" class="action-btn" onclick="window.closeCust()" style="background: var(--c1); color: #050508;">SAVE & EQUIP</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const previewCanvas = document.getElementById('previewCanvas');
    const pCtx = previewCanvas.getContext('2d');
    
    // --- ZOOM CAMERA LOGIC ---
    const V_WIDTH = 1000;
    const V_HEIGHT = 500;
    
    let floorY = V_HEIGHT - 100; 
    let ceilingY = 70;

    function resizeCanvas() {
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        ctx.setTransform(window.innerWidth / V_WIDTH, 0, 0, window.innerHeight / V_HEIGHT, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas); 
    resizeCanvas(); 

    // UI Elements
    const overlay = document.getElementById('overlay');
    const statsOverlay = document.getElementById('stats-overlay');
    const custOverlay = document.getElementById('cust-overlay');
    
    const startBtn = document.getElementById('start-btn');
    const crashText = document.getElementById('crash-text');
    const scoreDisplay = document.getElementById('score');
    
    const modeSelect = document.getElementById('modeSelect');
    const diffSelect = document.getElementById('diffSelect');
    const speedSelect = document.getElementById('speedSelect');
    const dualCheck = document.getElementById('dualCheck');
    const musicCheck = document.getElementById('musicCheck');

    const custModeSelect = document.getElementById('custModeSelect');
    const custStyleSelect = document.getElementById('custStyleSelect');
    
    // Game State
    let isPlaying = false; let isPausedForMenu = false;
    let score = 0; let frames = 0; let isHolding = false; let justClicked = false;
    let tunnelY = V_HEIGHT / 2; let waveTunnelDir = 'up'; 
    let globalHue = 180; 
    
    let obstacles = []; let trails = []; let players = []; let stars = []; let deathParticles = [];
    let config = { mode: 'cube', diff: 'normal', dual: false, speed: 8, size: 30 };

    let playerSkins = { cube: 1, ship: 1, wave: 1, ufo: 1, robot: 1, spider: 1, ball: 1, swing: 1 };
    let previewRotation = 0;
    let previewAnimId;

    // --- SAVE SYSTEM ---
    const modes = ['cube', 'ship', 'wave', 'ufo', 'robot', 'spider', 'ball', 'swing'];
    const difficulties = ['easy', 'medium', 'normal', 'hard', 'extreme'];
    const speeds = ['slow', 'normal', 'fast', '2x'];
    const speedMap = { '5': 'slow', '8': 'normal', '11': 'fast', '14': '2x' };

    let defaultStats = {};
    modes.forEach(m => {
        defaultStats[m] = {};
        difficulties.forEach(d => { 
            defaultStats[m][d] = {};
            speeds.forEach(s => {
                defaultStats[m][d][s] = { normal: { score: 0, attempts: 0, time: 0 }, dual: { score: 0, attempts: 0, time: 0 } };
            });
        });
    });

    let statsData = defaultStats;
    try {
        let loaded = localStorage.getItem('PractometryDashV1'); 
        if (loaded) { 
            let parsed = JSON.parse(loaded); 
            if (parsed.stats) statsData = parsed.stats; 
            if (parsed.skins) playerSkins = parsed.skins;
        }
    } catch (e) {}

    function saveData() { try { localStorage.setItem('PractometryDashV1', JSON.stringify({stats: statsData, skins: playerSkins})); } catch (e) {} }
    function formatTime(f) { let t = Math.floor(f / 60); return `${Math.floor(t / 60)}m ${t % 60}s`; }

    // --- SYNTHESIZER ---
    let audioCtx; let musicInterval; let noteIndex = 0;
    const bassline = [130.81, 130.81, 155.56, 130.81, 130.81, 196.00, 155.56, 146.83]; 

    function initAudio() {
        try {
            if (!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; if(AudioContext) audioCtx = new AudioContext(); }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {}
    }
    function playTone(freq, type, duration, vol=0.1) {
        if (!audioCtx || !musicCheck.checked) return;
        try {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    function playJumpSfx() { playTone(400, 'square', 0.1, 0.05); setTimeout(() => playTone(600, 'square', 0.1, 0.05), 50); }
    function playCrashSfx() { playTone(100, 'sawtooth', 0.4, 0.3); setTimeout(() => playTone(50, 'sawtooth', 0.5, 0.3), 100); }
    function playMusicNote() {
        if (!isPlaying || !musicCheck.checked) return;
        playTone(bassline[noteIndex % bassline.length], 'square', 0.2, 0.08); noteIndex++;
    }
    window.toggleMusic = function() {
        if (musicCheck.checked && isPlaying) { initAudio(); if (!musicInterval) musicInterval = setInterval(playMusicNote, 250); } 
        else { clearInterval(musicInterval); musicInterval = null; }
    }

    const diffMap = {
        easy:    { speedMult: 0.75, gap: 260, rate: 110 },
        medium:  { speedMult: 0.90, gap: 220, rate: 95 },
        normal:  { speedMult: 1.00, gap: 190, rate: 80 }, 
        hard:    { speedMult: 1.25, gap: 140, rate: 50 },
        extreme: { speedMult: 1.65, gap: 100, rate: 35 }  
    };

    for(let i=0; i<150; i++) { stars.push({ x: Math.random() * V_WIDTH*2, y: Math.random() * V_HEIGHT, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.1 }); }

    function updateColors() {
        if(isPlaying || isPausedForMenu) globalHue = (globalHue + 0.3) % 360;
        let c1 = `hsl(${globalHue}, 100%, 50%)`; let c2 = `hsl(${(globalHue + 160) % 360}, 100%, 50%)`; 
        document.documentElement.style.setProperty('--c1', c1); document.documentElement.style.setProperty('--c2', c2);
        return { c1, c2 };
    }

    function drawEntity(context, mode, styleId, size, c1, c2, isInverted) {
        let s = size; let hs = s/2;
        let mainCol = isInverted ? c2 : c1;
        context.fillStyle = mainCol; context.strokeStyle = '#fff'; context.lineWidth = 2;
        
        switch(mode) {
            case 'cube': context.fillRect(-hs, -hs, s, s); context.strokeRect(-hs, -hs, s, s); break;
            case 'robot': context.fillRect(-hs, -hs, s, hs); context.fillRect(-hs+4, 0, 8, hs); context.fillRect(hs-12, 0, 8, hs); break;
            case 'ship': context.beginPath(); context.moveTo(-hs, -hs); context.lineTo(hs, 0); context.lineTo(-hs, hs); context.fill(); context.stroke(); break;
            case 'wave': context.beginPath(); context.moveTo(hs, 0); context.lineTo(-hs, -hs); context.lineTo(-hs, hs); context.fill(); break;
            case 'ufo': context.beginPath(); context.arc(0, -4, hs, Math.PI, 0); context.fill(); context.stroke(); context.fillStyle = '#fff'; context.beginPath(); context.arc(0, -4, hs/2, Math.PI, 0); context.fill(); context.fillStyle = mainCol; context.fillRect(-hs-4, -4, s+8, 8); break;
            case 'spider': context.beginPath(); context.arc(0, 0, hs*0.7, 0, Math.PI*2); context.fill(); context.fillRect(-hs, -hs+4, s, 3); context.fillRect(-hs, hs-6, s, 3); context.fillRect(-4, -hs, 3, s); context.fillRect(2, -hs, 3, s); break;
            case 'ball': context.beginPath(); context.arc(0, 0, hs, 0, Math.PI*2); context.fill(); context.stroke(); break;
            case 'swing': context.beginPath(); context.arc(0, 0, hs, 0, Math.PI*2); context.fill(); context.stroke(); context.fillStyle = '#fff'; context.fillRect(-hs-4, -4, 8, 10); context.fillRect(hs-4, -4, 8, 10); break;
        }

        let altCol = isInverted ? c1 : c2;
        switch(parseInt(styleId)) {
            case 1: 
                if(mode==='cube' || mode==='robot') { context.fillStyle='#050508'; context.fillRect(-hs+4, -hs+4, 8, 8); context.fillRect(hs-12, -hs+4, 8, 8); }
                if(mode==='ship') { context.fillStyle='#050508'; context.fillRect(-hs+4, -hs/2, 10, s/2); }
                if(mode==='ball') { context.fillStyle='#050508'; context.beginPath(); context.arc(0, 0, hs/2, 0, Math.PI*2); context.fill(); }
                break;
            case 2: context.fillStyle = altCol; context.fillRect(-hs/2, -hs/2, hs, hs); break;
            case 3: context.strokeStyle = '#050508'; context.lineWidth = 4; context.strokeRect(-hs+4, -hs+4, s-8, s-8); break;
            case 4: context.fillStyle = '#fff'; context.beginPath(); context.arc(0, 0, hs/2, 0, Math.PI*2); context.fill(); context.fillStyle = '#000'; context.beginPath(); context.arc(0, 0, hs/4, 0, Math.PI*2); context.fill(); break;
            case 5: context.fillStyle = altCol; context.fillRect(-2, -hs+2, 4, s-4); context.fillRect(-hs+2, -2, s-4, 4); break;
            case 6: context.beginPath(); context.moveTo(-hs+4, -hs+4); context.lineTo(hs-4, hs-4); context.moveTo(hs-4, -hs+4); context.lineTo(-hs+4, hs-4); context.strokeStyle = altCol; context.lineWidth = 3; context.stroke(); break;
            case 7: context.fillStyle = '#fff'; context.beginPath(); context.moveTo(0, -hs+2); context.lineTo(hs-2, 0); context.lineTo(0, hs-2); context.lineTo(-hs+2, 0); context.fill(); break;
            case 8: context.fillStyle = '#050508'; context.beginPath(); context.arc(-hs/2, -hs/4, 4, 0, 7); context.arc(hs/2, hs/4, 4, 0, 7); context.fill(); break;
            case 9: context.fillStyle = altCol; context.globalAlpha = 0.5; context.fillRect(-hs, 0, s, hs); context.globalAlpha = 1.0; break;
            case 10: context.strokeStyle = '#050508'; context.lineWidth = 2; context.setLineDash([4, 4]); context.strokeRect(-hs+2, -hs+2, s-4, s-4); context.setLineDash([]); break;
        }
    }

    class Player {
        constructor(isInverted) {
            this.size = config.size; 
            this.x = V_WIDTH * 0.15;
            this.vy = 0; this.gravity = 0.85;
            this.inverted = isInverted; this.gravityDir = isInverted ? -1 : 1; 
            this.y = isInverted ? ceilingY : floorY - this.size; this.rotation = 0; this.robotTimer = 0;
        }

        jump() {
            let ground = this.gravityDir === 1 ? floorY - this.size : ceilingY;
            // Cube jump is now handled in update() to allow holding for continuous jumps!
            if (config.mode === 'ufo') { this.vy = -10 * this.gravityDir; playJumpSfx(); }
            if (config.mode === 'robot' && this.y === ground) { this.vy = -8.5 * this.gravityDir; this.robotTimer = 1; playJumpSfx(); }
            if (config.mode === 'spider' && this.y === ground) { this.gravityDir *= -1; this.y = this.gravityDir === 1 ? floorY - this.size : ceilingY; playJumpSfx(); }
            if (config.mode === 'ball' && this.y === ground) { this.gravityDir *= -1; playJumpSfx(); }
            if (config.mode === 'swing') { this.gravityDir *= -1; playJumpSfx(); }
        }

        update() {
            let grav = this.gravity * this.gravityDir; let ground = this.gravityDir === 1 ? floorY - this.size : ceilingY;
            let isGrounded = this.y === ground;

            switch(config.mode) {
                case 'cube': 
                    // AUTO-JUMP FEATURE: If holding space/click while grounded, jump automatically
                    if (isHolding && isGrounded) {
                        this.vy = -14 * this.gravityDir;
                        playJumpSfx();
                    }
                    this.vy += grav; 
                    if (!isGrounded) this.rotation += 0.15 * this.gravityDir; 
                    break;
                case 'ship': if (isHolding) this.vy -= 0.8 * this.gravityDir; this.vy += grav * 0.45; if (this.vy > 8) this.vy = 8; if (this.vy < -8) this.vy = -8; this.rotation = this.vy * 0.08; break;
                case 'wave': let wSpeed = config.speed * 1.25; let goingUp = this.inverted ? !isHolding : isHolding; this.vy = goingUp ? -wSpeed : wSpeed; if (isGrounded) this.rotation = 0; else this.rotation = goingUp ? -0.7 : 0.7; break;
                case 'ufo': this.vy += grav * 0.6; this.rotation = 0; break;
                case 'robot': if (isHolding && this.robotTimer > 0 && this.robotTimer < 14) { this.vy = -8.5 * this.gravityDir; this.robotTimer++; } else { this.robotTimer = 0; } this.vy += grav; break;
                case 'spider': this.vy = 0; break;
                case 'ball': this.vy += grav; if (!isGrounded) this.rotation += 0.2 * this.gravityDir; break;
                case 'swing': this.vy += grav * 0.45; break;
            }

            if (config.mode !== 'spider') this.y += this.vy;
            if (this.y > floorY - this.size) { this.y = floorY - this.size; this.vy = 0; if (config.mode === 'cube' || config.mode === 'robot') this.rotation = Math.round(this.rotation / (Math.PI/2)) * (Math.PI/2); }
            if (this.y < ceilingY) { this.y = ceilingY; this.vy = 0; if (config.mode === 'cube' || config.mode === 'robot') this.rotation = Math.round(this.rotation / (Math.PI/2)) * (Math.PI/2); }

            if (frames % 3 === 0) {
                let { c1, c2 } = updateColors();
                trails.push({ x: this.x + this.size/2, y: this.y + this.size/2, life: 1.0, color: this.inverted ? c2 : c1 });
            }
        }

        draw() {
            ctx.save(); ctx.translate(this.x + this.size/2, this.y + this.size/2); ctx.rotate(this.rotation);
            let { c1, c2 } = updateColors();
            drawEntity(ctx, config.mode, playerSkins[config.mode], this.size, c1, c2, this.inverted);
            ctx.restore();
        }
    }

    // --- MENUS ---
    window.handleSettingsChange = function() {
        if (isPausedForMenu) return;
        isPlaying = false; clearInterval(musicInterval); musicInterval = null;
        overlay.style.display = 'flex'; crashText.style.display = 'none'; startBtn.innerText = "SETTINGS APPLIED - START";
    };

    modeSelect.addEventListener('change', window.handleSettingsChange); diffSelect.addEventListener('change', window.handleSettingsChange);
    speedSelect.addEventListener('change', window.handleSettingsChange); dualCheck.addEventListener('change', window.handleSettingsChange);
    musicCheck.addEventListener('change', toggleMusic);

    let currentStatMode = 'cube'; let currentStatDiff = 'normal'; let currentStatSpeed = 'normal';
    function renderStats() {
        let globHigh = 0; let globAtt = 0; let globTime = 0;
        modes.forEach(m => { 
            difficulties.forEach(d => { 
                speeds.forEach(s => {
                    globHigh = Math.max(globHigh, statsData[m][d][s].normal.score, statsData[m][d][s].dual.score); 
                    globAtt += statsData[m][d][s].normal.attempts + statsData[m][d][s].dual.attempts; 
                    globTime += statsData[m][d][s].normal.time + statsData[m][d][s].dual.time; 
                });
            }); 
        });
        document.getElementById('glob-high').innerText = globHigh; document.getElementById('glob-att').innerText = globAtt; document.getElementById('glob-time').innerText = formatTime(globTime);

        const modeTabs = document.getElementById('mode-tabs'); modeTabs.innerHTML = '';
        modes.forEach(m => { const btn = document.createElement('div'); btn.className = `tab-btn ${currentStatMode === m ? 'active' : ''}`; btn.innerText = m.toUpperCase(); btn.onclick = () => { currentStatMode = m; renderStats(); }; modeTabs.appendChild(btn); });

        const diffTabs = document.getElementById('diff-tabs'); diffTabs.innerHTML = '';
        difficulties.forEach(d => { const btn = document.createElement('div'); btn.className = `sub-tab-btn ${currentStatDiff === d ? 'active' : ''}`; btn.innerText = d.toUpperCase(); btn.onclick = () => { currentStatDiff = d; renderStats(); }; diffTabs.appendChild(btn); });

        const speedTabs = document.getElementById('speed-tabs'); speedTabs.innerHTML = '';
        speeds.forEach(s => { const btn = document.createElement('div'); btn.className = `speed-tab-btn ${currentStatSpeed === s ? 'active' : ''}`; btn.innerText = s.toUpperCase(); btn.onclick = () => { currentStatSpeed = s; renderStats(); }; speedTabs.appendChild(btn); });

        const content = document.getElementById('tab-contents-container'); let data = statsData[currentStatMode][currentStatDiff][currentStatSpeed];
        content.innerHTML = `
            <div class="stats-row">
                <div class="stat-box"><h3>${currentStatMode} - ${currentStatDiff} - ${currentStatSpeed}</h3><p style="color: var(--c1); font-weight:bold; margin-bottom:15px;">[ NORMAL MODE ]</p><p>High Score: <br><span>${data.normal.score}</span></p><p>Attempts: <br><span>${data.normal.attempts}</span></p><p>Time Played: <br><span>${formatTime(data.normal.time)}</span></p></div>
                <div class="stat-box dual-box"><h3>${currentStatMode} - ${currentStatDiff} - ${currentStatSpeed}</h3><p style="color: var(--c2); font-weight:bold; margin-bottom:15px;">[ DUAL MODE ]</p><p>High Score: <br><span>${data.dual.score}</span></p><p>Attempts: <br><span>${data.dual.attempts}</span></p><p>Time Played: <br><span>${formatTime(data.dual.time)}</span></p></div>
            </div>`;
    }

    window.openStats = function() {
        isPlaying = false; isPausedForMenu = true; clearInterval(musicInterval); musicInterval = null;
        currentStatMode = modeSelect.value; currentStatDiff = diffSelect.value; currentStatSpeed = speedMap[speedSelect.value];
        overlay.style.display = 'none'; custOverlay.style.display = 'none'; statsOverlay.style.display = 'flex'; renderStats();
    };

    window.closeStats = function() {
        statsOverlay.style.display = 'none'; isPausedForMenu = false;
        if (score > 0) { isPlaying = true; window.toggleMusic(); } else overlay.style.display = 'flex';
    };

    function animatePreview() {
        if(custOverlay.style.display !== 'flex') return;
        pCtx.clearRect(0,0, previewCanvas.width, previewCanvas.height);
        let m = custModeSelect.value; let sId = custStyleSelect.value; let { c1, c2 } = updateColors(); 
        
        previewRotation += 0.02;
        pCtx.save(); pCtx.translate(100, 100);
        if(!['ufo', 'spider', 'ship'].includes(m)) pCtx.rotate(previewRotation);
        if(m === 'ship') pCtx.rotate(Math.sin(previewRotation)*0.3); 
        drawEntity(pCtx, m, sId, 80, c1, c2, false); pCtx.restore();
        previewAnimId = requestAnimationFrame(animatePreview);
    }

    window.openCust = function() {
        isPlaying = false; isPausedForMenu = true; clearInterval(musicInterval); musicInterval = null;
        custModeSelect.value = modeSelect.value; custStyleSelect.value = playerSkins[modeSelect.value];
        overlay.style.display = 'none'; statsOverlay.style.display = 'none'; custOverlay.style.display = 'flex'; animatePreview();
    };

    window.updateCustMode = function() { custStyleSelect.value = playerSkins[custModeSelect.value]; };
    window.updateCustStyle = function() { playerSkins[custModeSelect.value] = custStyleSelect.value; saveData(); };

    window.closeCust = function() {
        custOverlay.style.display = 'none'; cancelAnimationFrame(previewAnimId); isPausedForMenu = false;
        if (score > 0) { isPlaying = true; window.toggleMusic(); } else {
            players = []; players.push(new Player(false)); if(config.dual) players.push(new Player(true));
            overlay.style.display = 'flex';
        }
    };

    startBtn.addEventListener('click', (e) => {
        e.stopPropagation(); initAudio(); overlay.style.display = 'none';
        
        config.mode = modeSelect.value; config.diff = diffSelect.value; config.dual = dualCheck.checked; config.speed = parseFloat(speedSelect.value) * diffMap[config.diff].speedMult;
        players = []; players.push(new Player(false)); if (config.dual) players.push(new Player(true)); 

        let spdKey = speedMap[speedSelect.value];
        let varKey = config.dual ? 'dual' : 'normal'; statsData[config.mode][config.diff][spdKey][varKey].attempts++; saveData();

        obstacles = []; trails = []; deathParticles = []; frames = 0; score = 0; scoreDisplay.innerText = 0;
        isHolding = false; justClicked = false; tunnelY = Math.floor((floorY + ceilingY) / 2); waveTunnelDir = 'up';
        
        isPlaying = true; noteIndex = 0; window.toggleMusic();
    });

    function triggerDown(e) {
        if (!isPlaying || isPausedForMenu) return;
        if (e.code === 'Space') e.preventDefault(); if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
        isHolding = true; justClicked = true; players.forEach(p => p.jump());
    }
    function triggerUp(e) {
        if (!isPlaying || isPausedForMenu) return;
        if (e.type === 'keyup' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
        isHolding = false; players.forEach(p => p.robotTimer = 0);
    }

    window.addEventListener('keydown', triggerDown); window.addEventListener('keyup', triggerUp);
    canvas.addEventListener('mousedown', triggerDown); window.addEventListener('mouseup', triggerUp);
    canvas.addEventListener('touchstart', triggerDown, {passive: false}); window.addEventListener('touchend', triggerUp);

    function die() {
        isPlaying = false; playCrashSfx(); clearInterval(musicInterval); musicInterval = null;
        
        players.forEach(p => {
            for(let i=0; i<30; i++) {
                let { c1, c2 } = updateColors();
                deathParticles.push({ x: p.x + p.size/2, y: p.y + p.size/2, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20, life: 1.0, color: p.inverted ? c2 : c1 });
            }
        });

        let spdKey = speedMap[speedSelect.value];
        let varKey = config.dual ? 'dual' : 'normal';
        if (score > statsData[config.mode][config.diff][spdKey][varKey].score) statsData[config.mode][config.diff][spdKey][varKey].score = score;
        saveData();
        
        overlay.style.display = 'flex'; crashText.style.display = 'block'; startBtn.innerText = "TRY AGAIN";
    }

    function doObstacles() {
        let diff = diffMap[config.diff];
        
        if (config.mode === 'wave') {
            if (frames % 4 === 0) { 
                let waveGap = diff.gap * 1.3; let wSpeed = config.speed * 1.25; let slopeIncrement = wSpeed * 4; 
                if (waveTunnelDir === 'up') tunnelY -= slopeIncrement; else tunnelY += slopeIncrement;
                if (Math.random() < 0.05 || tunnelY < ceilingY + waveGap/2 + 20) waveTunnelDir = 'down';
                if (Math.random() < 0.05 || tunnelY > floorY - waveGap/2 - 20) waveTunnelDir = 'up';

                let w = config.speed * 6; 
                if (config.dual) {
                    let midLine = (floorY + ceilingY) / 2; let upperTunnelY = midLine - (midLine - ceilingY)/2 + (tunnelY - midLine)/2; let lowerTunnelY = midLine + (floorY - midLine)/2 - (tunnelY - midLine)/2; 
                    obstacles.push({ x: V_WIDTH, y: ceilingY, w: w, h: upperTunnelY - waveGap/2 - ceilingY, type: 'rect' });
                    obstacles.push({ x: V_WIDTH, y: upperTunnelY + waveGap/2, w: w, h: (lowerTunnelY - waveGap/2) - (upperTunnelY + waveGap/2), type: 'rect' });
                    obstacles.push({ x: V_WIDTH, y: lowerTunnelY + waveGap/2, w: w, h: floorY - (lowerTunnelY + waveGap/2), type: 'rect' });
                } else {
                    obstacles.push({ x: V_WIDTH, y: ceilingY, w: w, h: tunnelY - waveGap/2 - ceilingY, type: 'rect' });
                    obstacles.push({ x: V_WIDTH, y: tunnelY + waveGap/2, w: w, h: floorY - (tunnelY + waveGap/2), type: 'rect' });
                }
            }
        }
        else if (['ship', 'ufo', 'swing'].includes(config.mode)) {
            if (frames % Math.floor(diff.rate/2) === 0) { 
                if (config.mode === 'ship') tunnelY = (V_HEIGHT/2) + Math.sin(frames * 0.03) * 120; else tunnelY += (Math.random() - 0.5) * 120; 
                let gap = diff.gap; let w = 70; 
                if (config.dual) {
                    let midLine = (floorY + ceilingY) / 2; let upperTunnelY = midLine - (midLine - ceilingY)/2 + (Math.random()-0.5)*50; let lowerTunnelY = midLine + (floorY - midLine)/2 + (Math.random()-0.5)*50;
                    obstacles.push({ x: V_WIDTH, y: ceilingY, w: w, h: upperTunnelY - gap/2 - ceilingY, type: 'rect' });
                    obstacles.push({ x: V_WIDTH, y: upperTunnelY + gap/2, w: w, h: (lowerTunnelY - gap/2) - (upperTunnelY + gap/2), type: 'rect' });
                    obstacles.push({ x: V_WIDTH, y: lowerTunnelY + gap/2, w: w, h: floorY - (lowerTunnelY + gap/2), type: 'rect' });
                } else {
                    if (tunnelY < ceilingY + gap/2 + 20) tunnelY = ceilingY + gap/2 + 20; if (tunnelY > floorY - gap/2 - 20) tunnelY = floorY - gap/2 - 20;
                    obstacles.push({ x: V_WIDTH, y: ceilingY, w: w, h: tunnelY - gap/2 - ceilingY, type: 'rect' });
                    let bottomY = tunnelY + gap/2; obstacles.push({ x: V_WIDTH, y: bottomY, w: w, h: floorY - bottomY, type: 'rect' });
                }
            }
        }
        else if (config.mode === 'spider' || config.mode === 'ball') {
            if (frames % Math.floor(diff.rate * 0.7) === 0 && frames > 30) {
                let spikeCount = Math.floor(Math.random() * 2) + 1; let requiredFallFrames = 29; let horizontalGap = config.speed * requiredFallFrames; 
                if (config.mode === 'spider') {
                    let isTop = Math.random() > 0.5;
                    for (let k = 0; k < spikeCount; k++) obstacles.push({ x: V_WIDTH + k*35, y: isTop ? ceilingY + 30 : floorY, size: 35, top: isTop, type: 'spike' });
                } else {
                    for (let k = 0; k < spikeCount; k++) {
                        obstacles.push({ x: V_WIDTH + k*35, y: floorY, size: 35, top: false, type: 'spike' });
                        obstacles.push({ x: V_WIDTH + horizontalGap + k*35, y: ceilingY + 35, size: 35, top: true, type: 'spike' });
                    }
                }
            }
        }
        else {
            if (frames % diff.rate === 0 && frames > 30) {
                if (config.mode === 'cube') {
                    if (Math.random() > 0.90) { obstacles.push({ x: V_WIDTH, y: floorY - 80, w: 90, h: 25, type: 'rect' });
                    } else { let count = Math.floor(Math.random() * 3) + 1; for (let k = 0; k < count; k++) obstacles.push({ x: V_WIDTH + k*35, y: floorY, size: 35, top: false, type: 'spike' }); }
                    if (config.dual && Math.random() > 0.5) obstacles.push({ x: V_WIDTH, y: ceilingY + 35, size: 35, top: true, type: 'spike' });
                } 
                else if (config.mode === 'robot') {
                    let rType = Math.floor(Math.random() * 8); 
                    if (rType === 0) obstacles.push({ x: V_WIDTH, y: floorY - 35, w: 45, h: 35, type: 'rect' }); 
                    else if (rType === 1) obstacles.push({ x: V_WIDTH, y: floorY - 60, w: 45, h: 60, type: 'rect' }); 
                    else if (rType === 2) obstacles.push({ x: V_WIDTH, y: floorY - 85, w: 45, h: 85, type: 'rect' }); 
                    else if (rType === 3) { obstacles.push({ x: V_WIDTH, y: floorY - 35, w: 45, h: 35, type: 'rect' }); obstacles.push({ x: V_WIDTH + 45, y: floorY - 70, w: 45, h: 70, type: 'rect' }); } 
                    else if (rType === 4) { obstacles.push({ x: V_WIDTH, y: floorY, size: 35, top: false, type: 'spike' }); obstacles.push({ x: V_WIDTH + 35, y: floorY, size: 35, top: false, type: 'spike' }); } 
                    else if (rType === 5) { obstacles.push({ x: V_WIDTH, y: floorY - 25, w: 35, h: 25, type: 'rect' }); obstacles.push({ x: V_WIDTH + 35, y: floorY - 50, w: 35, h: 50, type: 'rect' }); obstacles.push({ x: V_WIDTH + 70, y: floorY - 75, w: 35, h: 75, type: 'rect' }); } 
                    else if (rType === 6) { obstacles.push({ x: V_WIDTH, y: floorY - 45, w: 35, h: 45, type: 'rect' }); obstacles.push({ x: V_WIDTH + 80, y: floorY - 45, w: 35, h: 45, type: 'rect' }); obstacles.push({ x: V_WIDTH + 40, y: floorY, size: 35, top: false, type: 'spike' }); } 
                    else if (rType === 7) { obstacles.push({ x: V_WIDTH + 10, y: floorY, size: 35, top: false, type: 'spike' }); obstacles.push({ x: V_WIDTH - 10, y: ceilingY, w: 90, h: floorY - ceilingY - 115, type: 'rect' }); }
                    if (config.dual) obstacles.push({ x: V_WIDTH, y: ceilingY + 35, size: 35, top: true, type: 'spike' });
                }
            }
        }

        let { c1, c2 } = updateColors();

        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i]; obs.x -= config.speed;
            if (obs.type === 'rect') {
                ctx.fillStyle = '#0a0e17'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.strokeStyle = c1; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = c1.replace('hsl', 'hsla').replace(')', ', 0.15)'); ctx.fillRect(obs.x+2, obs.y+2, obs.w-4, obs.h-4);
                players.forEach(p => { if (p.x < obs.x + obs.w && p.x + p.size > obs.x && p.y < obs.y + obs.h && p.y + p.size > obs.y) die(); });
            } else if (obs.type === 'spike') {
                ctx.fillStyle = c2; ctx.beginPath();
                if (obs.top) { ctx.moveTo(obs.x + obs.size/2, obs.y); ctx.lineTo(obs.x + obs.size, obs.y - obs.size); ctx.lineTo(obs.x, obs.y - obs.size); } 
                else { ctx.moveTo(obs.x + obs.size/2, obs.y - obs.size); ctx.lineTo(obs.x + obs.size, obs.y); ctx.lineTo(obs.x, obs.y); }
                ctx.fill(); 
                players.forEach(p => { if (p.x < obs.x + obs.size - 8 && p.x + p.size > obs.x + 8 && p.y < obs.y - 4 && p.y + p.size > obs.y - obs.size + 4) die(); });
            }
            if (obs.x + 200 < 0) { obstacles.splice(i, 1); i--; }
        }
    }

    function drawWorld() {
        ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT); 
        
        ctx.fillStyle = 'white';
        stars.forEach(s => { if(isPlaying) s.x -= config.speed * s.speed; if(s.x < 0) s.x = V_WIDTH; ctx.globalAlpha = s.speed; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); });
        ctx.globalAlpha = 1.0;

        let { c1, c2 } = updateColors();

        ctx.strokeStyle = c1.replace('hsl', 'hsla').replace(')', ', 0.1)'); ctx.lineWidth = 1; let offset = (frames * (config.speed * 0.5)) % 50;
        for(let i = 0; i < V_WIDTH + 50; i+=50) { ctx.beginPath(); ctx.moveTo(i - offset, ceilingY); ctx.lineTo(i - offset, floorY); ctx.stroke(); }

        ctx.fillStyle = '#050508'; ctx.fillRect(0, floorY, V_WIDTH, V_HEIGHT - floorY); ctx.fillRect(0, 0, V_WIDTH, ceilingY);
        ctx.fillStyle = c1; ctx.fillRect(0, floorY, V_WIDTH, 4); ctx.fillRect(0, ceilingY - 4, V_WIDTH, 4);

        if (config.dual && ['ship', 'wave', 'ufo', 'swing'].includes(config.mode)) { ctx.fillStyle = c1.replace('hsl', 'hsla').replace(')', ', 0.3)'); ctx.fillRect(0, (floorY+ceilingY)/2 - 1, V_WIDTH, 2); }

        for (let i = 0; i < trails.length; i++) { let t = trails[i]; t.life -= 0.05; t.x -= config.speed; ctx.fillStyle = t.color; ctx.globalAlpha = Math.max(0, t.life * 0.5); ctx.beginPath(); ctx.arc(t.x, t.y, 6, 0, Math.PI*2); ctx.fill(); if (t.life <= 0) { trails.splice(i, 1); i--; } }
        ctx.globalAlpha = 1.0;
        
        for (let i = 0; i < deathParticles.length; i++) { let p = deathParticles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02; ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.fillRect(p.x, p.y, 6, 6); if (p.life <= 0) { deathParticles.splice(i, 1); i--; } }
        ctx.globalAlpha = 1.0;
    }

    function gameLoop() {
        if (!isPausedForMenu) {
            drawWorld();
            if (isPlaying) {
                players.forEach(p => p.update()); doObstacles(); frames++;
                let spdKey = speedMap[speedSelect.value];
                let varKey = config.dual ? 'dual' : 'normal'; statsData[config.mode][config.diff][spdKey][varKey].time++; 
                if (frames % 5 === 0) { score++; scoreDisplay.innerText = score; }
            }
            if(isPlaying || frames === 0) players.forEach(p => p.draw()); 
            justClicked = false; 
        }
        requestAnimationFrame(gameLoop);
    }

    players.push(new Player(false));
    gameLoop();
</script>
</body>
</html>
